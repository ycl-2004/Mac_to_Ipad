name: Build Windows Receiver

on:
  push:
    paths:
      - 'Sources/BetterCastReceiverDesktop/**'
      - '.github/workflows/build-windows-receiver.yml'
  workflow_dispatch:  # Manual trigger from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  QT_VERSION: '6.7.0'
  VDD_VERSION: '25.7.23'  # Virtual Display Driver release tag

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Qt 6 via aqtinstall
        shell: pwsh
        run: |
          pip install aqtinstall
          python -m aqt install-qt windows desktop ${{ env.QT_VERSION }} win64_msvc2019_64 `
            --modules qtmultimedia `
            --outputdir C:/Qt
          echo "Qt6_DIR=C:/Qt/${{ env.QT_VERSION }}/msvc2019_64" >> $env:GITHUB_ENV
          echo "C:/Qt/${{ env.QT_VERSION }}/msvc2019_64/bin" >> $env:GITHUB_PATH

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: |
            C:/vcpkg/installed
            C:/vcpkg/buildtrees
            C:/vcpkg/packages
          key: vcpkg-ffmpeg-x64-windows-${{ hashFiles('.github/workflows/build-windows-receiver.yml') }}
          restore-keys: |
            vcpkg-ffmpeg-x64-windows-

      - name: Install FFmpeg via vcpkg (with x264 encoder)
        shell: pwsh
        run: |
          vcpkg install "ffmpeg[x264]:x64-windows" --recurse
        env:
          VCPKG_ROOT: C:/vcpkg

      - name: Generate Windows icon (.ico)
        shell: pwsh
        run: |
          pip install Pillow
          python -c "
          from PIL import Image
          img = Image.open('Sources/BetterCastReceiverDesktop/icon_256x256.png')
          img.save('Sources/BetterCastReceiverDesktop/appicon.ico',
                   sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])
          "

      - name: Configure CMake
        shell: pwsh
        run: |
          cd Sources/BetterCastReceiverDesktop
          mkdir build
          cd build
          cmake .. -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake" `
            -DCMAKE_PREFIX_PATH="$env:Qt6_DIR" `
            -DENABLE_SENDER=ON

      - name: Build
        shell: pwsh
        run: |
          cd Sources/BetterCastReceiverDesktop/build
          cmake --build . --config Release

      - name: Download ADB platform-tools
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://dl.google.com/android/repository/platform-tools-latest-windows.zip" `
            -OutFile "platform-tools.zip"
          Expand-Archive -Path "platform-tools.zip" -DestinationPath "."
          if (Test-Path "platform-tools/adb.exe") {
            Write-Host "ADB downloaded successfully"
          } else {
            Write-Host "WARNING: adb.exe not found in download"
          }

      - name: Download Virtual Display Driver (VDD)
        shell: pwsh
        run: |
          $vddTag = "${{ env.VDD_VERSION }}"
          $baseUrl = "https://github.com/VirtualDrivers/Virtual-Display-Driver/releases/download/${vddTag}"

          mkdir "vdd" -Force
          try {
            # Download the actual driver package (contains .inf + .dll for pnputil)
            $driverUrl = "${baseUrl}/VirtualDisplayDriver-x86.Driver.Only.zip"
            Write-Host "Downloading VDD driver from: $driverUrl"
            Invoke-WebRequest -Uri $driverUrl -OutFile "vdd-driver.zip" -MaximumRedirection 5
            Expand-Archive -Path "vdd-driver.zip" -DestinationPath "vdd-driver-extract"
            Get-ChildItem "vdd-driver-extract" -Recurse -File | ForEach-Object {
              Copy-Item $_.FullName "vdd/" -Force
            }

            # Also download VDD Control app (UI for managing virtual displays)
            $controlUrl = "${baseUrl}/VDD.Control.${vddTag}.zip"
            Write-Host "Downloading VDD Control from: $controlUrl"
            Invoke-WebRequest -Uri $controlUrl -OutFile "vdd-control.zip" -MaximumRedirection 5
            Expand-Archive -Path "vdd-control.zip" -DestinationPath "vdd-control-extract"
            Get-ChildItem "vdd-control-extract" -Recurse -File | ForEach-Object {
              Copy-Item $_.FullName "vdd/" -Force
            }

            $fileCount = (Get-ChildItem "vdd" -File).Count
            Write-Host "VDD: $fileCount files extracted"
            Get-ChildItem "vdd" | ForEach-Object { Write-Host "  $_" }

            # Verify we have the .inf file needed for driver installation
            $infFiles = Get-ChildItem "vdd" -Filter "*.inf"
            if ($infFiles.Count -eq 0) {
              Write-Host "WARNING: No .inf file found in VDD package"
            } else {
              Write-Host "VDD driver .inf found: $($infFiles.Name)"
            }
          } catch {
            Write-Host "WARNING: Failed to download VDD: $_"
            Write-Host "Installer will be built without VDD bundled"
          }

      - name: Package artifact
        shell: pwsh
        run: |
          mkdir artifact

          # Copy the exe
          Copy-Item "Sources/BetterCastReceiverDesktop/build/Release/BetterCastReceiver.exe" "artifact/"

          # Run windeployqt to bundle Qt DLLs
          windeployqt --release --no-translations --no-system-d3d-compiler `
            --no-opengl-sw "artifact/BetterCastReceiver.exe"

          # Copy FFmpeg DLLs
          $vcpkgBin = "C:/vcpkg/installed/x64-windows/bin"
          if (Test-Path $vcpkgBin) {
            Get-ChildItem "$vcpkgBin/*.dll" | ForEach-Object {
              Copy-Item $_.FullName "artifact/"
            }
          }

          # Bundle ADB (adb.exe + required DLLs)
          if (Test-Path "platform-tools/adb.exe") {
            Copy-Item "platform-tools/adb.exe" "artifact/"
            Copy-Item "platform-tools/AdbWinApi.dll" "artifact/" -ErrorAction SilentlyContinue
            Copy-Item "platform-tools/AdbWinUsbApi.dll" "artifact/" -ErrorAction SilentlyContinue
            Write-Host "ADB bundled into artifact"
          }

          # Copy app icon for runtime (embedded via Qt resource, but also keep as fallback)
          Copy-Item "Sources/BetterCastReceiverDesktop/appicon.ico" "artifact/" -ErrorAction SilentlyContinue

          # Bundle VDD files into portable artifact too
          if ((Test-Path "vdd") -and (Get-ChildItem "vdd" -File).Count -gt 0) {
            mkdir "artifact/VirtualDisplayDriver" -Force
            Copy-Item "vdd/*" "artifact/VirtualDisplayDriver/" -Force
            Write-Host "VDD files bundled into portable artifact"
          }

      - name: Install NSIS
        shell: pwsh
        run: |
          # Use portable NSIS ZIP from nsis.sourceforge.io (no installer needed)
          $nsisVersion = "3.10"
          $nsisUrl = "https://github.com/nicehash/NSIS/releases/download/v${nsisVersion}/nsis-${nsisVersion}.zip"
          try {
            Invoke-WebRequest -Uri $nsisUrl -OutFile "nsis.zip"
          } catch {
            # Fallback: try winget
            Write-Host "GitHub download failed, trying winget..."
            winget install NSIS.NSIS --accept-source-agreements --accept-package-agreements --silent
          }

          if (Test-Path "nsis.zip") {
            Expand-Archive -Path "nsis.zip" -DestinationPath "C:/nsis"
            # Find the extracted folder (may be nsis-3.10/)
            $nsisDir = Get-ChildItem "C:/nsis" -Directory | Select-Object -First 1
            if ($nsisDir) {
              echo "$($nsisDir.FullName)" >> $env:GITHUB_PATH
              Write-Host "NSIS portable extracted to $($nsisDir.FullName)"
            } else {
              echo "C:/nsis" >> $env:GITHUB_PATH
            }
          } else {
            echo "C:\Program Files (x86)\NSIS" >> $env:GITHUB_PATH
          }

      - name: Build installer
        shell: pwsh
        run: |
          cd Sources/BetterCastReceiverDesktop

          # Copy artifact and vdd directories next to installer.nsi
          # (NSIS references files relative to the .nsi script)
          Copy-Item -Recurse "${{ github.workspace }}/artifact" "artifact"
          Copy-Item -Recurse "${{ github.workspace }}/vdd" "vdd"

          # Build the installer
          makensis /DPRODUCT_VERSION="1.0.0" installer.nsi

          # Move installer to workspace root
          Move-Item "BetterCast-Setup-*.exe" "${{ github.workspace }}/"

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: BetterCastReceiver-Windows-x64
          path: artifact/
          retention-days: 30

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: BetterCast-Setup-Windows-x64
          path: BetterCast-Setup-*.exe
          retention-days: 30
